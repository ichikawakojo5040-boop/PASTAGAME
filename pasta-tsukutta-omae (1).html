<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>パスタ作ったお前・プロンプト版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Yusei+Magic&family=Zen+Kaku+Gothic+New:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#150b06;
    --bg-panel:#241207;
    --orange:#FF5A1F;
    --orange-2:#FF8A3D;
    --gold:#FFC94A;
    --gold-2:#FFE49A;
    --cream:#FFF3E2;
    --red:#C21807;
    --shadow-flame: 0 0 40px rgba(255,90,31,.55);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(circle at 20% 0%, rgba(255,138,61,.25), transparent 55%),
      radial-gradient(circle at 85% 15%, rgba(255,201,74,.18), transparent 50%),
      radial-gradient(circle at 50% 100%, rgba(194,24,7,.25), transparent 60%),
      var(--bg-deep);
    font-family:'Zen Kaku Gothic New', sans-serif;
    color:var(--cream);
    display:flex;
    justify-content:center;
    padding:18px 12px 60px;
    overflow-x:hidden;
  }
  .app{
    width:100%;
    max-width:480px;
    display:flex;
    flex-direction:column;
    gap:18px;
    transition: transform .12s;
  }
  .app.shake{ animation: shake .45s ease; }
  @keyframes shake{
    0%,100%{transform:translate(0,0) rotate(0);}
    20%{transform:translate(-6px,2px) rotate(-0.5deg);}
    40%{transform:translate(6px,-2px) rotate(0.5deg);}
    60%{transform:translate(-4px,1px) rotate(-0.3deg);}
    80%{transform:translate(4px,-1px) rotate(0.3deg);}
  }

  header{ text-align:center; padding-top:6px; }
  .eyebrow{
    font-size:.72rem; letter-spacing:.28em; color:var(--gold);
    font-weight:700; opacity:.85;
  }
  h1{
    font-family:'Yusei Magic', sans-serif;
    font-size:clamp(1.6rem, 7vw, 2.1rem);
    margin:6px 0 2px;
    background:linear-gradient(90deg, var(--gold-2), var(--orange-2));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 2px 18px rgba(255,138,61,.35);
  }
  .sub{ font-size:.78rem; color:#e8c9a8; opacity:.8; }

  section.card{
    background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(0,0,0,.15)), var(--bg-panel);
    border:1px solid rgba(255,201,74,.18);
    border-radius:20px;
    padding:16px;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
  }

  /* ---- player ---- */
  .player-top{ display:flex; align-items:center; gap:14px; margin-bottom:14px; }
  .disc{
    width:52px; height:52px; border-radius:50%; flex:0 0 auto;
    background:
      radial-gradient(circle at 50% 50%, var(--bg-deep) 0 14%, transparent 15%),
      conic-gradient(from 0deg, #3a1c0c, #6b2f0f, #3a1c0c 70%, #6b2f0f);
    border:2px solid var(--gold);
    box-shadow: var(--shadow-flame);
  }
  .disc.spin{ animation: spin 3s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .song-info{ min-width:0; }
  .song-title{ font-weight:700; font-size:1rem; color:var(--gold-2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .song-artist{ font-size:.78rem; color:#d8b48b; }

  .controls{ display:flex; align-items:center; gap:10px; }
  #playPauseBtn{
    width:50px; height:50px; border-radius:50%; flex:0 0 auto;
    border:none; cursor:pointer;
    background:linear-gradient(145deg, var(--orange-2), var(--red));
    color:var(--cream); font-size:1.2rem;
    box-shadow:0 6px 16px rgba(194,24,7,.4);
    display:flex; align-items:center; justify-content:center;
  }
  #playPauseBtn:active{ transform:scale(.92); }
  .seek-wrap{ flex:1; display:flex; align-items:center; gap:8px; min-width:0; }
  .time{ font-size:.72rem; color:#e8c9a8; font-variant-numeric:tabular-nums; width:36px; flex:0 0 auto; }
  #seekBar{
    flex:1; appearance:none; -webkit-appearance:none; height:6px; border-radius:6px;
    background:linear-gradient(90deg, var(--gold) var(--pct,0%), rgba(255,255,255,.15) var(--pct,0%));
    outline:none;
  }
  #seekBar::-webkit-slider-thumb{
    -webkit-appearance:none; width:16px; height:16px; border-radius:50%;
    background:var(--gold-2); border:2px solid var(--orange); cursor:pointer;
    box-shadow:0 0 8px rgba(255,201,74,.7);
  }
  #seekBar::-moz-range-thumb{
    width:16px; height:16px; border-radius:50%;
    background:var(--gold-2); border:2px solid var(--orange); cursor:pointer;
  }

  /* ---- echo panel ---- */
  .echo-panel{
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 16px;
  }
  .echo-label{ display:flex; flex-direction:column; }
  .echo-label b{ font-size:.92rem; color:var(--gold-2); }
  .echo-label span{ font-size:.68rem; color:#d8b48b; }
  .switch{ position:relative; display:inline-block; width:56px; height:30px; }
  .switch input{ opacity:0; width:0; height:0; }
  .slider{
    position:absolute; cursor:pointer; inset:0;
    background:rgba(255,255,255,.12); border-radius:30px; transition:.25s;
    border:1px solid rgba(255,201,74,.3);
  }
  .slider::before{
    content:""; position:absolute; height:22px; width:22px; left:3px; top:3px;
    background:var(--cream); border-radius:50%; transition:.25s;
  }
  .switch input:checked + .slider{ background:linear-gradient(90deg, var(--orange), var(--gold)); box-shadow:var(--shadow-flame); }
  .switch input:checked + .slider::before{ transform:translateX(26px); }

  /* ---- main pasta button ---- */
  .main-button-wrap{ display:flex; justify-content:center; padding:10px 0 6px; position:relative; }
  .pasta-btn{
    width:220px; height:220px; border-radius:50%;
    border:5px solid var(--gold-2);
    background:radial-gradient(circle at 35% 30%, var(--orange-2), var(--orange) 55%, var(--red) 100%);
    color:#fff8ec;
    font-family:'Yusei Magic', sans-serif;
    font-size:clamp(1.3rem, 6.5vw, 1.7rem);
    line-height:1.35;
    cursor:pointer;
    position:relative;
    box-shadow:0 0 0 8px rgba(255,90,31,.08), 0 16px 40px rgba(194,24,7,.5), var(--shadow-flame);
    animation: pulse 2.2s ease-in-out infinite;
    text-shadow:0 2px 6px rgba(0,0,0,.35);
  }
  .pasta-btn:active{ transform:scale(.94); filter:brightness(1.15); }
  @keyframes pulse{
    0%,100%{ box-shadow:0 0 0 8px rgba(255,90,31,.08), 0 16px 40px rgba(194,24,7,.5), 0 0 40px rgba(255,90,31,.55); }
    50%{ box-shadow:0 0 0 16px rgba(255,90,31,.03), 0 16px 46px rgba(194,24,7,.6), 0 0 65px rgba(255,138,61,.85); }
  }

  /* ---- ainote grid ---- */
  .ainote-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:12px;
  }
  .ainote-btn{
    padding:20px 10px; border-radius:16px; border:none; cursor:pointer;
    background:linear-gradient(145deg, #3a2210, #241207);
    border:1px solid rgba(255,201,74,.35);
    color:var(--gold-2);
    font-family:'Yusei Magic', sans-serif;
    font-size:1.15rem;
    box-shadow:0 6px 14px rgba(0,0,0,.35);
  }
  .ainote-btn:active{ transform:scale(.95); background:linear-gradient(145deg, var(--orange), var(--red)); color:#fff; }
  .ainote-btn.renren{ grid-column: 1 / -1; background:linear-gradient(145deg, var(--red), #7a0f04); color:#fff; }

  /* ---- flash overlay ---- */
  .flash-overlay{
    position:fixed; inset:0; z-index:9999; pointer-events:none;
    display:flex; align-items:center; justify-content:center;
    text-align:center; padding:0 6vw;
    font-family:'Yusei Magic', sans-serif;
    font-size:clamp(1.8rem, 11vw, 4.2rem);
    color:var(--gold-2);
    text-shadow:0 0 20px rgba(255,90,31,.9), 0 0 60px rgba(255,201,74,.7);
    opacity:0;
    background:radial-gradient(circle, rgba(255,90,31,.0), rgba(0,0,0,0));
  }
  .flash-overlay.show{ animation: flashPop .9s ease-out; }
  @keyframes flashPop{
    0%{ opacity:0; transform:scale(.5); background:radial-gradient(circle, rgba(255,90,31,.0), rgba(0,0,0,0)); }
    12%{ opacity:1; transform:scale(1.12); background:radial-gradient(circle, rgba(255,90,31,.35), rgba(0,0,0,0)); }
    30%{ transform:scale(1); }
    75%{ opacity:1; }
    100%{ opacity:0; transform:scale(1.02); }
  }

  footer{
    font-size:.68rem; color:#b98d63; text-align:center; line-height:1.7; padding:4px 8px 0;
  }
  footer code{ color:var(--gold); }

  @media (max-width:360px){
    .pasta-btn{ width:180px; height:180px; }
  }

  #toast{
    position:fixed; left:50%; bottom:22px; transform:translate(-50%, 20px);
    max-width:90vw; padding:10px 16px; border-radius:12px;
    background:rgba(20,10,5,.95); border:1px solid var(--gold);
    color:var(--gold-2); font-size:.78rem; text-align:center;
    box-shadow:0 8px 24px rgba(0,0,0,.5);
    opacity:0; pointer-events:none; z-index:10000;
    transition:opacity .25s, transform .25s;
  }
  #toast.show{ opacity:1; transform:translate(-50%, 0); }
</style>
</head>
<body>
<div class="app" id="app">

  <header>
    <div class="eyebrow">湘南乃風「純恋歌」ネタサウンドボード</div>
    <h1>パスタ作ったお前<br>プロンプト版</h1>
    <div class="sub">どんな歌詞のタイミングでも、強引に割り込め。</div>
  </header>

  <!-- 楽曲プレイヤー -->
  <section class="card">
    <div class="player-top">
      <div class="disc" id="disc"></div>
      <div class="song-info">
        <div class="song-title">純恋歌</div>
        <div class="song-artist">湘南乃風</div>
      </div>
    </div>
    <div class="controls">
      <button id="playPauseBtn" aria-label="再生・一時停止">▶</button>
      <div class="seek-wrap">
        <span class="time" id="curTime">0:00</span>
        <input type="range" id="seekBar" min="0" max="1000" value="0" step="1">
        <span class="time" id="durTime">0:00</span>
      </div>
    </div>
    <audio id="bgMusic" src="music.mp3" preload="metadata" crossorigin="anonymous"></audio>
  </section>

  <!-- エコー切替 -->
  <section class="card echo-panel">
    <div class="echo-label">
      <b>エコー・エフェクト</b>
      <span>合の手・パスタボイスに深いディレイをかける</span>
    </div>
    <label class="switch">
      <input type="checkbox" id="echoToggle">
      <span class="slider"></span>
    </label>
  </section>

  <!-- メインボタン -->
  <div class="main-button-wrap">
    <button class="pasta-btn" id="pastaBtn">パスタ<br>作ったお前</button>
  </div>

  <!-- 合の手ボタン群 -->
  <section class="ainote-grid">
    <button class="ainote-btn" data-src="eee.mp3">エェ</button>
    <button class="ainote-btn" data-src="ah.mp3">ア゙</button>
    <button class="ainote-btn" data-src="oh.mp3">oh</button>
    <button class="ainote-btn renren" id="renrenBtn" data-src="pasta_short.mp3">パスタ! 連打</button>
  </section>

  <footer>
    音声は仮のプレースホルダです。同じフォルダに <code>music.mp3</code>(純恋歌フル音源)/ <code>pasta.mp3</code>(パスタ作ったお前!)/ <code>pasta_short.mp3</code>(パスタ!連打用)/ <code>eee.mp3</code> / <code>ah.mp3</code> / <code>oh.mp3</code> を配置して差し替えてください。
  </footer>
</div>

<div class="flash-overlay" id="flashOverlay">(((((パスタ作ったお前)))))</div>

<script>
(function(){
  "use strict";

  /* =========================================================
     Web Audio エンジン: BGMダッキング + 効果音のポリフォニック再生 + エコー
     ========================================================= */
  const AudioEngine = {
    ctx: null,
    buffers: {},
    loadingPromises: {},
    musicGain: null,
    musicSourceNode: null,
    dryGain: null,
    delayNode: null,
    feedbackGain: null,
    wetGain: null,
    masterGain: null,
    echoOn: false,
    ready: false,

    init(){
      if (this.ready) return;
      const Ctx = window.AudioContext || window.webkitAudioContext;
      this.ctx = new Ctx();

      this.masterGain = this.ctx.createGain();
      this.masterGain.gain.value = 1;
      this.masterGain.connect(this.ctx.destination);

      // --- BGM チェーン(ダッキング用ゲイン) ---
      this.musicGain = this.ctx.createGain();
      this.musicGain.gain.value = 1;
      this.musicGain.connect(this.masterGain);

      const bgEl = document.getElementById('bgMusic');
      this.musicSourceNode = this.ctx.createMediaElementSource(bgEl);
      this.musicSourceNode.connect(this.musicGain);

      // --- 効果音チェーン(ドライ + ディレイ/フィードバックによるエコー) ---
      this.dryGain = this.ctx.createGain();
      this.dryGain.gain.value = 1;
      this.dryGain.connect(this.masterGain);

      this.delayNode = this.ctx.createDelay(3.0);
      this.delayNode.delayTime.value = 0.32;

      this.feedbackGain = this.ctx.createGain();
      this.feedbackGain.gain.value = 0.42; // 深めのフィードバックでリバーブ的な余韻

      this.wetGain = this.ctx.createGain();
      this.wetGain.gain.value = 0; // 初期はエコーOFF

      this.delayNode.connect(this.feedbackGain);
      this.feedbackGain.connect(this.delayNode);
      this.delayNode.connect(this.wetGain);
      this.wetGain.connect(this.masterGain);

      this.ready = true;
    },

    async resume(){
      this.init();
      if (this.ctx.state === 'suspended') {
        try { await this.ctx.resume(); } catch(e){ /* noop */ }
      }
    },

    setEcho(on){
      this.echoOn = on;
      if (!this.ready) return;
      const now = this.ctx.currentTime;
      const target = on ? 0.5 : 0.0;
      this.wetGain.gain.cancelScheduledValues(now);
      this.wetGain.gain.setValueAtTime(this.wetGain.gain.value, now);
      this.wetGain.gain.linearRampToValueAtTime(target, now + 0.15);
    },

    // <audio>要素のプールを使ったポリフォニック再生。
    // fetch()は file:// で開いた場合に完全ブロックされるブラウザがあるため使わない。
    // <audio src>は file:// でも同一フォルダなら再生できるので、これをWeb Audioにつないでエコーをかける。
    pools: {},
    POOL_SIZE: 6,

    ensurePool(url){
      if (this.pools[url]) return this.pools[url];
      const elements = [];
      for (let i = 0; i < this.POOL_SIZE; i++){
        const el = new Audio(url);
        el.preload = 'auto';
        el.addEventListener('error', () => {
          showToast('音声ファイル「' + url + '」が見つかりません。HTMLと同じフォルダに配置してください。');
        }, { once: true });
        try {
          const node = this.ctx.createMediaElementSource(el);
          node.connect(this.dryGain);
          node.connect(this.delayNode);
        } catch (e) {
          console.warn('音声ノードの接続に失敗:', url, e);
        }
        elements.push(el);
      }
      this.pools[url] = { elements, index: 0 };
      return this.pools[url];
    },

    // ポリフォニック再生: プール内の要素を順番に使うので連打しても途切れない
    playEffect(url){
      this.init();
      if (this.ctx.state === 'suspended') this.ctx.resume().catch(()=>{});
      const pool = this.ensurePool(url);
      const el = pool.elements[pool.index];
      pool.index = (pool.index + 1) % pool.elements.length;
      try {
        el.currentTime = 0;
      } catch (e) { /* まだ読み込み中の場合は無視 */ }
      const playPromise = el.play();
      if (playPromise && playPromise.catch) {
        playPromise.catch((err) => {
          console.warn('再生できませんでした:', url, err);
        });
      }
    },

    // BGMを一瞬ダッキングして、どのタイミングでも強引に割り込む
    duckMusic(){
      if (!this.ready) return;
      const now = this.ctx.currentTime;
      this.musicGain.gain.cancelScheduledValues(now);
      this.musicGain.gain.setValueAtTime(this.musicGain.gain.value, now);
      this.musicGain.gain.linearRampToValueAtTime(0.12, now + 0.09);
      this.musicGain.gain.linearRampToValueAtTime(1.0, now + 1.7);
    }
  };

  /* =========================================================
     楽曲プレイヤー
     ========================================================= */
  const bgMusic = document.getElementById('bgMusic');
  const playPauseBtn = document.getElementById('playPauseBtn');
  const disc = document.getElementById('disc');
  const seekBar = document.getElementById('seekBar');
  const curTimeEl = document.getElementById('curTime');
  const durTimeEl = document.getElementById('durTime');
  let isSeeking = false;

  function fmtTime(sec){
    if (!isFinite(sec) || sec < 0) sec = 0;
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return m + ':' + String(s).padStart(2, '0');
  }

  playPauseBtn.addEventListener('click', () => {
    AudioEngine.init();
    if (AudioEngine.ctx.state === 'suspended') AudioEngine.ctx.resume().catch(()=>{});
    if (bgMusic.paused) {
      const p = bgMusic.play();
      if (p && p.catch) p.catch((err) => {
        console.warn('BGM再生に失敗:', err);
        showToast('music.mp3 が見つからないか再生できません。ファイルを配置して再度お試しください。');
      });
    } else {
      bgMusic.pause();
    }
  });

  bgMusic.addEventListener('error', () => {
    showToast('music.mp3 が見つかりません。HTMLと同じフォルダに配置してください。');
  });

  bgMusic.addEventListener('play', () => {
    playPauseBtn.textContent = '❚❚';
    disc.classList.add('spin');
  });
  bgMusic.addEventListener('pause', () => {
    playPauseBtn.textContent = '▶';
    disc.classList.remove('spin');
  });

  bgMusic.addEventListener('loadedmetadata', () => {
    durTimeEl.textContent = fmtTime(bgMusic.duration);
  });

  bgMusic.addEventListener('timeupdate', () => {
    if (isSeeking) return;
    curTimeEl.textContent = fmtTime(bgMusic.currentTime);
    if (bgMusic.duration) {
      const pct = (bgMusic.currentTime / bgMusic.duration) * 1000;
      seekBar.value = pct;
      seekBar.style.setProperty('--pct', (pct / 10) + '%');
    }
  });

  seekBar.addEventListener('input', () => {
    isSeeking = true;
    const pct = seekBar.value / 1000;
    seekBar.style.setProperty('--pct', (pct * 100) + '%');
    if (bgMusic.duration) {
      curTimeEl.textContent = fmtTime(pct * bgMusic.duration);
    }
  });
  seekBar.addEventListener('change', () => {
    if (bgMusic.duration) {
      bgMusic.currentTime = (seekBar.value / 1000) * bgMusic.duration;
    }
    isSeeking = false;
  });

  /* =========================================================
     エコー切替
     ========================================================= */
  const echoToggle = document.getElementById('echoToggle');
  echoToggle.addEventListener('change', () => {
    AudioEngine.init();
    if (AudioEngine.ctx.state === 'suspended') AudioEngine.ctx.resume().catch(()=>{});
    AudioEngine.setEcho(echoToggle.checked);
  });

  /* =========================================================
     画面フラッシュ演出
     ========================================================= */
  const app = document.getElementById('app');
  const flashOverlay = document.getElementById('flashOverlay');

  function flashPasta(){
    flashOverlay.classList.remove('show');
    void flashOverlay.offsetWidth; // 強制リフロー = アニメーション再トリガー
    flashOverlay.classList.add('show');

    app.classList.remove('shake');
    void app.offsetWidth;
    app.classList.add('shake');
  }

  /* =========================================================
     「パスタ作ったお前」メインボタン
     ========================================================= */
  const pastaBtn = document.getElementById('pastaBtn');
  pastaBtn.addEventListener('click', () => {
    AudioEngine.duckMusic();          // 再生中の音量を一瞬ダッキング
    AudioEngine.playEffect('pasta.mp3'); // どのタイミングでも強引に割り込んで再生
    flashPasta();
  });

  /* =========================================================
     合の手ボタン群(パスタ!連打含む、すべてポリフォニック)
     ========================================================= */
  document.querySelectorAll('.ainote-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      AudioEngine.playEffect(btn.dataset.src);
    });
  });

  /* =========================================================
     簡易トースト(音声ファイルが見つからない時に画面上で知らせる)
     ========================================================= */
  let toastTimer = null;
  function showToast(msg){
    let t = document.getElementById('toast');
    if (!t) {
      t = document.createElement('div');
      t.id = 'toast';
      document.body.appendChild(t);
    }
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3200);
  }
  window.showToast = showToast;

})();
</script>
</body>
</html>
